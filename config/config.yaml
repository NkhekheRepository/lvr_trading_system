system:
  name: lvr_trading_system
  version: 1.0.0
  mode: TESTNET
  environment: development
  log_level: INFO
  log_dir: logs
  live_confirm_required: true

exchange:
  name: binance_futures
  testnet: true
  rate_limits:
    orders_per_second: 10
    requests_per_second: 120
    max_open_orders: 50
  symbols:
    - BTCUSDT
    - ETHUSDT

execution:
  slippage_alpha: 0.5
  simulated_latency_ms: 100
  modes:
    SIM:
      deterministic_fills: true
      zero_slippage: false
    PAPER:
      use_real_market_data: true
      slippage_multiplier: 1.0
    TESTNET:
      use_binance_api: true
      slippage_multiplier: 1.0
      testnet_url: "https://testnet.binancefuture.com"
    LIVE:
      use_vnpy: true
      slippage_multiplier: 1.5
  fees:
    maker: 0.00020
    taker: 0.00040
  testnet_api_key: "G91ebHRA8tqXiIppBPjXhLfRgiRajbTvrWcVUo8xdGC05RiZCULSucvgMBlhtkZQ"
  testnet_api_secret: "FwTk0ZabfsOHDWUqDnEvNTPpilTuc9P9nHMeI9T02AgERba76vV70TJa7CJElKTC"

risk:
  base_risk_per_trade: 0.01
  max_leverage: 10
  limits:
    max_drawdown_pct: 0.10
    max_daily_loss_pct: 0.03
    max_position_size_pct: 0.20
    max_correlation: 0.7
  soft_limits:
    position_warning_pct: 0.15
    daily_loss_warning_pct: 0.02
    consecutive_losses: 3

features:
  return_window: 50
  volatility_window: 100
  depth_window: 100
  spread_window: 100
  zscore_threshold: 3.0

strategy:
  ofi_threshold: 0.7
  regime_threshold: 2.0
  signal_decay: 0.95
  min_confidence: 0.3
  reversal_window: 5
  reversal_required: true

portfolio:
  initial_capital: 100000.0
  currency: USDT
  rebalance_threshold: 0.05

learning:
  min_samples: 30
  update_rate: 0.1
  max_change_per_update: 0.05
  cooldown_ticks: 10
  edge_threshold: 0.001

monitoring:
  collection_interval: 1.0
  alerts:
    slack_webhook: ""
    email_recipients: []
    rate_limit_per_minute: 10
    telegram_bot_token: ""
    telegram_chat_id: ""
    telegram_enabled: true
  health_check_interval: 5.0
  data_freshness_threshold_sec: 10

autonomy:
  enabled: true
  mode: full_auto  # full_auto, semi_auto, manual
  min_confidence: 0.3
  min_edge: 0.0001
  max_drawdown_pct: 0.15
  max_daily_loss_pct: 0.05
  max_leverage: 10.0
  data_freshness_ms: 5000
  pause_on_failure_count: 5

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  refresh_interval_ms: 1000
  max_history: 1000

state:
  checkpoint_interval_sec: 60
  event_log_enabled: true
  event_retention_days: 90
  auto_recovery: true
  validate_on_startup: true

database:
  host: localhost
  port: 5432
  name: trading_system
  user: trading_user
  pool_size: 10
  max_overflow: 20

redis:
  host: localhost
  port: 6379
  db: 0
  password: ""
  pool_size: 10
  socket_timeout: 5

